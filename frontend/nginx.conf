server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: any path that does not match a real file is served as
    # index.html so React can handle client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite hashes asset filenames (e.g. index-B9OC-ReB.js), so they are
    # safe to cache aggressively — a new build produces new filenames.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache index.html so the browser always fetches the latest entry
    # point, which then loads the correctly hashed assets.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Compact access logs — errors always go to stderr.
    access_log /dev/stdout;
    error_log  /dev/stderr warn;
}
