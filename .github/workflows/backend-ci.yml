name: Backend CI

# ─── Triggers ─────────────────────────────────────────────────────────────────
# Runs ONLY when backend-relevant files change, keeping CI minutes low.
on:
  push:
    branches: [main]
    tags: ['v*.*.*']          # semver tags trigger a versioned release build
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile'
      - '.github/workflows/backend-ci.yml'

  pull_request:
    branches: [main]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile'
      - '.github/workflows/backend-ci.yml'

# ─── Globals ──────────────────────────────────────────────────────────────────
env:
  REGISTRY:   ghcr.io
  IMAGE_NAME: ghcr.io/alphanemoclaw/aks_watcher/backend

jobs:
  # ── 1. Lint & test ────────────────────────────────────────────────────────
  test:
    name: Go lint & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod   # reads the `go` directive from go.mod
          cache: true               # caches the module download cache

      - name: Verify dependencies
        run: go mod verify

      - name: go vet
        run: go vet ./...

      # Uncomment once you add tests:
      # - name: Run tests
      #   run: go test ./...

  # ── 2. Build & push image ─────────────────────────────────────────────────
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: test   # only runs if the test job passes

    permissions:
      contents: read
      packages: write   # required to push to GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Buildx enables BuildKit features: layer caching, multi-platform, etc.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login is skipped on PRs so forks can't push images to your registry.
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # auto-provisioned by Actions

      # Generates the full set of tags based on the triggering event:
      #
      #   push to main   → latest  +  sha-<short-sha>
      #   push v1.2.3    → 1.2.3   +  1.2  +  1  +  latest  +  sha-<short-sha>
      #   pull_request   → pr-<number>  (image is built but NOT pushed)
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=pr

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          # push=false on PRs — we still build to catch Dockerfile errors early.
          push: ${{ github.event_name != 'pull_request' }}
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache: subsequent runs reuse unchanged layers.
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── 3. Update image tag → ArgoCD picks up the change ─────────────────────
  deploy:
    name: Commit updated image tag
    runs-on: ubuntu-latest
    needs: build-and-push
    # Only run on direct pushes to main, never on PRs.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: write   # needed to push the manifest commit

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetch main directly so we always commit on top of the latest state.
          ref: main

      - name: Update image tag in deployment manifest
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          NEW_IMAGE="ghcr.io/alphanemoclaw/aks_watcher/backend:sha-${SHORT_SHA}"
          sed -i "s|image: ghcr.io/alphanemoclaw/aks_watcher/backend:.*|image: ${NEW_IMAGE}|" \
            k8s/backend/deployment.yaml

      - name: Commit and push
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/backend/deployment.yaml
          # --quiet exits 0 when there is nothing to commit (idempotent).
          git diff --staged --quiet && echo "No change to commit" && exit 0
          git commit -m "chore: update backend image to sha-${SHORT_SHA} [skip ci]"
          git push
