name: Frontend CI

# ─── Triggers ─────────────────────────────────────────────────────────────────
# Runs ONLY when frontend-relevant files change.
on:
  push:
    branches: [main]
    tags: ['v*.*.*']
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'

  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'

# ─── Globals ──────────────────────────────────────────────────────────────────
env:
  REGISTRY:   ghcr.io
  IMAGE_NAME: ghcr.io/alphanemoclaw/aks_watcher/frontend

jobs:
  # ── 1. Type-check & build ─────────────────────────────────────────────────
  test:
    name: TypeScript type-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript type-check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Vite build (dry-run)
        working-directory: frontend
        run: npm run build   # catches any bundling errors before we build the image

  # ── 2. Build & push image ─────────────────────────────────────────────────
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Same tagging strategy as the backend:
      #
      #   push to main   → latest  +  sha-<short-sha>
      #   push v1.2.3    → 1.2.3   +  1.2  +  1  +  latest  +  sha-<short-sha>
      #   pull_request   → pr-<number>  (built but NOT pushed)
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=pr

      # The Docker build context is `frontend/` because that is where
      # package.json, src/, nginx.conf, etc. live.
      # VITE_API_BASE_URL is intentionally empty: the nginx-ingress routes
      # /api to the backend, so the browser uses a relative path.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── 3. Update image tag → ArgoCD picks up the change ─────────────────────
  deploy:
    name: Commit updated image tag
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Update image tag in deployment manifest
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          NEW_IMAGE="ghcr.io/alphanemoclaw/aks_watcher/frontend:sha-${SHORT_SHA}"
          sed -i "s|image: ghcr.io/alphanemoclaw/aks_watcher/frontend:.*|image: ${NEW_IMAGE}|" \
            k8s/frontend/deployment.yaml

      - name: Commit and push
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/frontend/deployment.yaml
          git diff --staged --quiet && echo "No change to commit" && exit 0
          git commit -m "chore: update frontend image to sha-${SHORT_SHA} [skip ci]"
          git push
