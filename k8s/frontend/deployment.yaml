apiVersion: apps/v1
kind: Deployment
metadata:
  name: aks-watcher-frontend
  namespace: aks-watcher
  labels:
    app: aks-watcher-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aks-watcher-frontend
  template:
    metadata:
      labels:
        app: aks-watcher-frontend
    spec:
      containers:
        - name: aks-watcher-frontend
          # Image tag is updated automatically by the CI deploy job.
          image: ghcr.io/alphanemoclaw/aks_watcher/frontend:sha-1af1ebd
          ports:
            - name: http
              containerPort: 80

          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3

          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi

      imagePullPolicy: IfNotPresent
