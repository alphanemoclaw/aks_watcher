apiVersion: v1
kind: Service
metadata:
  name: aks-watcher-backend
  namespace: aks-watcher
spec:
  # ClusterIP: only reachable inside the cluster.
  # The ingress routes /api traffic here; no direct external access needed.
  type: ClusterIP
  selector:
    app: aks-watcher-backend
  ports:
    - name: http
      port: 8080
      targetPort: http
