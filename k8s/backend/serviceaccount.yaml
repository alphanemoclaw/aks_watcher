apiVersion: v1
kind: ServiceAccount
metadata:
  name: aks-watcher-backend
  namespace: aks-watcher
  annotations:
    # Workload Identity: link this ServiceAccount to the Azure Managed Identity
    # that has Reader access on the target subscription / resource group.
    #
    # Pre-requisites (one-time Azure + cluster setup):
    #   1. az aks update -g <RG> -n <CLUSTER> --enable-oidc-issuer --enable-workload-identity
    #   2. Create a User-Assigned Managed Identity and assign it the Reader role
    #   3. Create a federated credential pointing to this ServiceAccount
    #
    # Then replace the placeholder below with the Managed Identity client ID:
    azure.workload.identity/client-id: "2b371b80-2886-44b2-b9c6-3cdd8531a59a"
