apiVersion: v1
kind: ConfigMap
metadata:
  name: aks-watcher-backend
  namespace: aks-watcher
data:
  # Required: the Azure subscription to scan.
  AZURE_SUBSCRIPTION_ID: "<YOUR_SUBSCRIPTION_ID>"

  # Optional: restrict results to a single resource group.
  # Remove or leave empty to scan the whole subscription.
  AZURE_RESOURCE_GROUP: ""
